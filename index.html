<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Mood Board</title>
    <meta
      name="description"
      content="Enter any city, get a beautiful mood board card matching the current weather."
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,700;1,9..144,300;1,9..144,400&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <!-- html2canvas for PNG export -->
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"
      defer
    ></script>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- Background ambient blobs -->
    <div class="bg-blobs" aria-hidden="true">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
    </div>

    <!-- Main App -->
    <main class="app">

      <!-- Header -->
      <header class="header">
        <div class="header-logo">
          <span class="logo-icon">🌤️</span>
          <span class="logo-text">moodcast</span>
        </div>
        <p class="header-tagline">Your city's current vibe, beautifully captured.</p>
      </header>

      <!-- Search -->
      <section class="search-section" aria-label="City search">
        <div class="search-wrapper">
          <input
            type="text"
            id="city-input"
            class="search-input"
            placeholder="Enter a city..."
            autocomplete="off"
            spellcheck="false"
            aria-label="City name"
            maxlength="60"
          />
          <button
            id="search-btn"
            class="search-btn"
            aria-label="Get weather mood"
          >
            <span class="btn-text">Get Vibe</span>
            <span class="btn-icon">→</span>
          </button>
        </div>
        <p class="search-hint">Try: Tokyo, Lagos, Reykjavik, Buenos Aires</p>
      </section>

      <!-- Error Message -->
      <div id="error-msg" class="error-msg" role="alert" aria-live="polite" hidden>
        <span class="error-icon">⚠️</span>
        <span id="error-text"></span>
      </div>

      <!-- Loading State -->
      <div id="loading" class="loading" aria-live="polite" hidden>
        <div class="loading-dots">
          <span></span><span></span><span></span>
        </div>
        <p class="loading-text">Reading the atmosphere...</p>
      </div>

      <!-- Card Section -->
      <section id="card-section" class="card-section" hidden>

        <!-- The Card (this is what gets exported as PNG) -->
        <div id="weather-card" class="weather-card">

          <!-- Card Header -->
          <div class="card-header">
            <div class="card-location">
              <h1 id="card-city" class="card-city">—</h1>
              <p id="card-country" class="card-country">—</p>
            </div>
            <div id="card-icon" class="card-icon" aria-hidden="true">☀️</div>
          </div>

          <!-- Card Divider -->
          <div class="card-divider"></div>

          <!-- Temperature Block -->
          <div class="card-temp-block">
            <span id="card-temp" class="card-temp">—</span>
            <div class="card-temp-meta">
              <span id="card-feels" class="card-feels">Feels like —</span>
              <button id="unit-toggle" class="unit-toggle" aria-label="Toggle temperature unit">°C / °F</button>
            </div>
          </div>

          <!-- Mood Block -->
          <div class="card-mood-block">
            <span id="card-mood" class="card-mood">—</span>
            <p id="card-vibe" class="card-vibe">—</p>
          </div>

          <!-- Stats Row -->
          <div class="card-stats">
            <div class="stat">
              <span class="stat-icon">💧</span>
              <span id="stat-humidity" class="stat-value">—</span>
              <span class="stat-label">Humidity</span>
            </div>
            <div class="stat">
              <span class="stat-icon">💨</span>
              <span id="stat-wind" class="stat-value">—</span>
              <span class="stat-label">Wind</span>
            </div>
            <div class="stat">
              <span class="stat-icon">🌂</span>
              <span id="stat-precip" class="stat-value">—</span>
              <span class="stat-label">Rain chance</span>
            </div>
          </div>

          <!-- Card Footer -->
          <div class="card-footer">
            <span id="card-condition" class="card-condition">—</span>
            <span id="card-time" class="card-time">—</span>
          </div>

          <!-- Watermark -->
          <div class="card-watermark">moodcast.app</div>

        </div>
        <!-- end #weather-card -->

        <!-- Actions below card -->
        <div class="card-actions">
          <button id="download-btn" class="action-btn download-btn">
            <span>↓</span> Download Card
          </button>
          <button id="new-search-btn" class="action-btn secondary-btn">
            Try another city
          </button>
        </div>

      </section>

    </main>

    <!-- Footer -->
    <footer class="footer">
      Made by <a href="https://github.com/OsmundMillion" target="_blank" rel="noopener noreferrer" class="footer-link">Osmund</a>
    </footer>

    <!-- Scripts (type module for ES6 imports) -->
    <script type="module" src="js/app.js"></script>
  </body>
</html>
